services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE_NAME}:latest
    container_name: cu-timepad-bot-app
    restart: always
    environment:
      - MONGODB=mongodb://root:${MONGODB_PASSWORD}@mongodb:27017/
      - BOT_TOKEN=${BOT_TOKEN}
      - PROXY_URL=${PROXY_URL}
      - WEBHOOK_URL=${WEBHOOK_URL}
    depends_on:
      - mongodb
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mongodb:
    image: dburszty/mongodb-raspberrypi:7.0.14
    container_name: cu-timepad-bot-mongodb
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
    driver: local
