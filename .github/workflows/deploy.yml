name: CI/CD Docker Compose Deploy

on:
  push:
    branches:
      - master


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.event.repository.name }}

jobs:
  # Stage 1: Build and Push to GHCR
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/arm64
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}:latest
          labels: ${{ steps.meta.outputs.labels }}

  # Stage 2: Pull and Re-deploy
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Log in to GHCR on Self-Hosted Runner
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy updated infrastructure via Docker Compose
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
          PROXY_URL: ${{ vars.PROXY_URL }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
        run: |
          # Create xray config
          echo "$XRAY_CONFIG" > ./xray.conf

          # Pull down the newly pushed app image from GHCR
          docker compose -f docker-compose.prod.yml pull

          # Spin up containers in detached mode, recreating only modified configurations
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          # Clear out dangling images to prevent disk space exhaustion
          docker image prune -f
